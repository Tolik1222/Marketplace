{% extends "base.html" %}

{% block title %}Додати товар{% endblock %}

{% block content %}
<h1>Додати новий товар</h1>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Зберегти товар</button>
</form>
{% endblock %}
