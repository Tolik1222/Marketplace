{% extends "base.html" %}

{% block title %}Нове звернення{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 p-lg-5">
                    <h3 class="mb-4"><i class="bi bi-chat-square-text me-2"></i>Нове звернення в підтримку</h3>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">{{ form.subject.label }}</label>
                            {{ form.subject }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label">{{ form.message.label }}</label>
                            {{ form.message }}
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Відправити</button>
                            <a href="{% url 'support:ticket_list' %}" class="btn btn-light border">Скасувати</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
