<!DOCTYPE html>
<html>
<head>
    <title>Оплата скасована</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <div class="card shadow border-0 p-5">
                    <div class="mb-4">
                        <!-- Іконка попередження -->
                        <div class="bg-warning text-dark rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
                            <span style="font-size: 40px;">!</span>
                        </div>
                    </div>
                    <h1 class="fw-bold text-dark">Оплата не завершена</h1>
                    <p class="text-muted mb-4">
                        Здається, процес оплати було перервано або виникла технічна помилка. Не хвилюйтеся, кошти не були зняті.
                    </p>
                    <div class="d-grid gap-2">
                        <a href="{% url 'cart:cart_detail' %}" class="btn btn-warning btn-lg">Повернутися до кошика</a>
                        <a href="{% url 'products:product_list' %}" class="btn btn-outline-secondary">На головну сторінку</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
