<!DOCTYPE html>
<html>
<head>
    <title>Оплата успішна</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <div class="card shadow border-0 p-5">
                    <div class="mb-4">
                        <!-- Велика іконка галочки -->
                        <div class="bg-success text-white rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
                            <span style="font-size: 40px;">✓</span>
                        </div>
                    </div>
                    <h1 class="fw-bold text-dark">Оплата успішна!</h1>
                    <p class="text-muted mb-4">
                        Дякуємо за покупку. Ваше замовлення вже передано на склад і скоро буде відправлено.
                    </p>
                    <div class="d-grid gap-2">
                        <a href="{% url 'products:product_list' %}" class="btn btn-success btn-lg">Продовжити покупки</a>
                        <p class="mt-3 text-secondary small">Квитанція про оплату надіслана на вашу пошту.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</html>
